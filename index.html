<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Журнал 86РТК</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #1c2120; --card: #2a3130; --accent: #10b981; --text: #e2e8f0; --muted: #94a3b8;
            --error: #ff3b30; --gold: #ffd700;
        }
        * { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        html, body { background-color: var(--bg); margin: 0; padding: 0; color: var(--text); min-height: 100vh; }
        body { padding: 20px; padding-bottom: 50px; }

        /* СТИЛЬНЫЙ ЛОАДЕР */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .loader-text { 
            font-size: 10px; font-weight: 700; color: var(--muted); 
            text-transform: uppercase; letter-spacing: 0.3em; 
            margin-bottom: 30px; animation: breath 2.5s infinite ease-in-out; 
        }
        .logo-container { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo-icon {
            width: 50px; height: 65px;
            background: linear-gradient(135deg, #10b981, #34d399, #10b981);
            background-size: 200% 200%;
            border-radius: 8px 15px 15px 8px;
            position: relative;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
            animation: flow 4s infinite ease-in-out, pulse-scale 3s infinite ease-in-out;
        }
        .logo-icon::before {
            content: ""; position: absolute; top: 15px; left: 10px;
            width: 25px; height: 3px; background: rgba(255,255,255,0.4);
            border-radius: 2px; box-shadow: 0 8px 0 rgba(255,255,255,0.4), 0 16px 0 rgba(255,255,255,0.4);
        }
        .copyright { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.15); margin-top: 10px; letter-spacing: 1px; }

        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulse-scale { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.2); } }
        @keyframes breath { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* ИНТЕРФЕЙС */
        #main-content { opacity: 0; transition: 0.5s; }
        .header-title { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .header-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #search { width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 14px 18px; border-radius: 15px; background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; transition: 0.3s; }
        #search:focus { border-color: var(--accent); }

        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .card:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        .student-header { display: flex; justify-content: space-between; align-items: center; }
        .student-name { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .abs-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 6px; background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid rgba(255,255,255,0.05); }

        .score-pill { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; min-width: 38px; text-align: center; }
        .m-low { background: #ff3b30; } .m-warn { background: #ff9f0a; } .m-high { background: #34c759; }
        .m-gold { background: linear-gradient(135deg, #ffd700, #ff9500); color: #000; }
        .m-none { background: rgba(255,255,255,0.1); color: var(--muted); }

        .subs-container { display: none; padding-top: 15px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .subs-container.open { display: block; }
        .sub-item { margin-bottom: 12px; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .marks-box { display: none; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; margin-top: 5px; flex-direction: column; gap: 8px; }
        .marks-box.open { display: flex; }
        .marks-row { display: flex; flex-wrap: wrap; gap: 4px; }
        .mark { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .analytic-tip { font-size: 9px; color: var(--accent); font-weight: 700; text-transform: uppercase; background: rgba(16, 185, 129, 0.1); padding: 4px 8px; border-radius: 6px; align-self: flex-start; }

        .fab-update { position: fixed; bottom: 25px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">Загрузка данных...</div>
        <div class="logo-container"><div class="logo-icon"></div></div>
        <div class="copyright">by @skwared</div>
    </div>

    <div id="main-content">
        <div class="header-title">Единый Журнал</div>
        <div class="header-sub">Группа 86РТК</div>
        <input type="text" id="search" placeholder="Поиск по фамилии..." autocomplete="off">
        <div id="list"></div>
    </div>

    <div class="fab-update" onclick="forceUpdate()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z""")/>></svg>
    </div>

    <script>
        // --- ВСТАВЬ ССЫЛКИ СЮДА ---
        const API_JOURNAL = 'https://script.google.com/macros/s/AKfycbzrbDXKkZhKJohza3bbsUF1eoDb9WbLcdfdfheog9cpsPpVHrScR0qb2TVc9JTGtN0b/exec';
        const API_ABSENCES = 'https://script.google.com/macros/s/AKfycbyux4wfN_lVoodDq-JHHjbYAGuJys_DsZ2mADyUGdw1MERG-iZK833dN0tSzI7lq_QeZg/exec';
        
        const tg = window.Telegram?.WebApp;
        let ALL_DATA = { journal: [], absences: {} };

        function getStyle(m) {
            const v = parseFloat(String(m).replace(',', '.'));
            if (isNaN(v) || v <= 0) return 'm-none';
            if (v >= 9.5) return 'm-gold'; 
            if (v >= 7.5) return 'm-high';
            if (v >= 5) return 'm-warn';
            return 'm-low';
        }

        function calcNeed(currentAvg, marks) {
            let avg = parseFloat(String(currentAvg).replace(',', '.'));
            if (isNaN(avg) || avg >= 10 || marks.length === 0) return null;
            let decimal = avg - Math.floor(avg);
            if (decimal >= 0.29 && decimal <= 0.51) {
                let target = Math.ceil(avg + 0.001);
                let sum = marks.reduce((a, b) => a + (parseFloat(String(b).replace(',','.')) || 0), 0);
                for (let i = 1; i <= 10; i++) {
                    if ((sum + i * 10) / (marks.length + i) >= target) return `Нужно ${i} отм. (10) до ${target}.0`;
                }
            }
            return null;
        }

        async function init(force = false) {
            if (tg) { tg.ready(); tg.expand(); tg.headerColor = '#1c2120'; }
            const cached = localStorage.getItem('journal_final_v1');
            if (!force && cached) { ALL_DATA = JSON.parse(cached); render(); hideLoader(); }

            try {
                const [resJ, resA] = await Promise.all([
                    fetch(API_JOURNAL).then(r => r.json()),
                    fetch(API_ABSENCES).then(r => r.json())
                ]);

                const absMap = {};
                if (Array.isArray(resA)) resA.forEach(a => { if(a.name) absMap[a.name.trim()] = a.count; });

                ALL_DATA = { journal: Array.isArray(resJ) ? resJ : (resJ.journal || []), absences: absMap };
                localStorage.setItem('journal_final_v1', JSON.stringify(ALL_DATA));
                render(); hideLoader();
            } catch (e) {
                if (!ALL_DATA.journal.length) document.querySelector('.loader-text').innerText = "Ошибка сети";
            }
        }

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = '';
            const query = document.getElementById('search').value.toLowerCase();

            // Топ-3
            const sortedByScore = [...ALL_DATA.journal].sort((a,b) => parseFloat(b.totalAverage.replace(',','.')) - parseFloat(a.totalAverage.replace(',','.')));
            const topNames = sortedByScore.slice(0, 3).map(s => s.studentName);
            const crowns = ['🥇', '🥈', '🥉'];

            const list = ALL_DATA.journal.filter(s => s.studentName.toLowerCase().includes(query)).sort((a,b) => a.studentName.localeCompare(b.studentName));
            
            list.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                const absCount = ALL_DATA.absences[s.studentName] || "0";
                const tIdx = topNames.indexOf(s.studentName);

                card.onclick = () => {
                    card.querySelector('.subs-container').classList.toggle('open');
                    if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('soft');
                };
                
                let subsHtml = s.subjects.map(sub => {
                    const tip = calcNeed(sub.avg, sub.marks);
                    return `<div class="sub-item" onclick="event.stopPropagation(); this.querySelector('.marks-box').classList.toggle('open');">
                        <div class="sub-row"><span>${sub.subject}</span><span class="score-pill ${getStyle(sub.avg)}">${sub.avg}</span></div>
                        <div class="marks-box">
                            ${tip ? `<div class="analytic-tip">${tip}</div>` : ''}
                            <div class="marks-row">${sub.marks.map(m => `<div class="mark ${getStyle(m)}">${m}</div>`).join('')}</div>
                        </div>
                    </div>`;
                }).join('');

                card.innerHTML = `
                    <div class="student-header">
                        <span class="student-name">
                            ${s.studentName} ${tIdx !== -1 ? crowns[tIdx] : ''}
                            <span class="abs-badge">⏳ ${absCount}</span>
                        </span>
                        <span class="score-pill ${getStyle(s.totalAverage)}">${s.totalAverage}</span>
                    </div>
                    <div class="subs-container">${subsHtml || '<div style="font-size:11px; opacity:0.3; text-align:center;">Нет данных</div>'}</div>`;
                container.appendChild(card);
            });
        }

        function forceUpdate() {
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            const l = document.getElementById('loader');
            l.style.display = 'flex'; l.style.opacity = '1';
            init(true);
        }

        function hideLoader() {
            const l = document.getElementById('loader');
            l.style.opacity = '0';
            setTimeout(() => { l.style.display = 'none'; document.getElementById('main-content').style.opacity = '1'; }, 600);
        }

        document.getElementById('search').oninput = render;
        init();
    </script>
</body>
</html>
